<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Video Library Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #1e1e1e; --sidebar-bg: #252526; --header-bg: #333333; --text-color: #cccccc; --text-highlight: #ffffff; --accent-color: #9cdcfe; --border-color: #3e3e42; --sidebar-width: 350px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); height: 100dvh; display: flex; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: var(--header-bg); }
        .add-channel-box { display: flex; gap: 5px; margin-top: 10px; }
        .add-channel-box input { flex: 1; padding: 8px; background: #3c3c3c; border: 1px solid #3c3c3c; color: white; border-radius: 4px; }
        .add-channel-box button { padding: 8px 12px; background: #0e639c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .channel-list { flex: 1; overflow-y: auto; }
        .channel-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; }
        .channel-item.active { background: #37373d; border-left-color: var(--accent-color); }
        .channel-icon { width: 32px; height: 32px; border-radius: 50%; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .main-header { padding: 15px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .video-list-container { flex: 1; overflow-y: auto; padding: 20px; }
        .video-card { display: flex; gap: 15px; background: #2d2d2d; padding: 12px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; }
        .video-thumb { width: 140px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        #progressContainer { display: none; height: 3px; background: #333; }
        #progressBar { height: 100%; background: var(--accent-color); width: 0; transition: width 0.3s; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 style="color:var(--accent-color)"><i class="fab fa-youtube"></i> Library</h2>
            <div class="add-channel-box">
                <input type="text" id="channelInput" placeholder="@핸들 또는 URL">
                <button id="addChannelBtn"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div class="channel-list" id="channelListWrapper"></div>
    </aside>

    <main class="main-content">
        <div id="progressContainer"><div id="progressBar"></div></div>
        <div class="main-header">
            <div>
                <h1 id="currentTitle" style="font-size:1.1rem;">채널을 선택하세요</h1>
                <div id="channelUrl" style="font-size:0.7rem; color:#888"></div>
            </div>
            <div id="headerActions" style="display:none; gap:10px;">
                <button onclick="refreshCurrentChannel()">업데이트</button>
                <button id="copyBtn" onclick="copyNextLink()">링크 복사</button>
            </div>
        </div>
        <div class="video-list-container" id="videoListContainer"></div>
    </main>

    <div class="modal" id="playerModal">
        <div style="width:90%; max-width:900px; aspect-ratio:16/9; position:relative;">
            <button onclick="closePlayer()" style="position:absolute; top:-35px; right:0; color:white; background:none; border:none; font-size:1.5rem; cursor:pointer;">×</button>
            <iframe id="youtubePlayer" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_SERVER_URL = ''; 
        let myChannels = JSON.parse(localStorage.getItem('myVideos')) || [];
        let currentVideoList = [];
        let activeChannelId = null;
        let loadingChannelId = null;
        let copyIndex = 0;

        window.onload = renderChannelList;

        function saveToStorage() {
            localStorage.setItem('myVideos', JSON.stringify(myChannels));
        }

        async function loadVideos(channelId, title, forceRefresh = false) {
            const channel = myChannels.find(c => c.channelId === channelId);
            
            // 캐시 데이터가 있고 강제 새로고침이 아니면 즉시 표시
            if (!forceRefresh && activeChannelId === channelId && channel.videos?.length > 0) {
                currentVideoList = channel.videos;
                renderVideoList();
                return;
            }

            activeChannelId = channelId;
            loadingChannelId = channelId;
            copyIndex = 0;
            renderChannelList();

            document.getElementById('currentTitle').textContent = title;
            document.getElementById('headerActions').style.display = 'flex';
            
            // 새로고침 시 기존 데이터 초기화
            if (forceRefresh) channel.videos = [];

            const container = document.getElementById('videoListContainer');
            container.innerHTML = '<p style="text-align:center; padding:20px;">로딩 중...</p>';
            
            let nextPageToken = '';
            document.getElementById('progressContainer').style.display = 'block';

            try {
                while (nextPageToken !== null) {
                    if (loadingChannelId !== channelId) return;

                    const res = await fetch(`${API_SERVER_URL}/api/channel-videos?channelId=${channelId}&pageToken=${nextPageToken}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);

                    // 핵심: 페이지 데이터를 받을 때마다 즉시 누적 및 저장
                    channel.videos = channel.videos.concat(data.videos);
                    currentVideoList = channel.videos;
                    
                    saveToStorage(); // 루프 도중 실시간 저장
                    renderVideoList(); // 루프 도중 실시간 UI 갱신

                    nextPageToken = data.nextPageToken || null;
                    document.getElementById('progressBar').style.width = nextPageToken ? '50%' : '100%';
                }
            } catch (e) {
                if (channel.videos.length === 0) container.innerHTML = `<p style="color:red; text-align:center;">에러: ${e.message}</p>`;
            } finally {
                document.getElementById('progressContainer').style.display = 'none';
            }
        }

        function renderVideoList() {
            const container = document.getElementById('videoListContainer');
            container.innerHTML = currentVideoList.map((v, i) => `
                <div class="video-card" onclick="openPlayer('${v.id}')">
                    <img src="${v.thumbnail}" class="video-thumb">
                    <div>
                        <div style="font-weight:bold; margin-bottom:5px;">${v.title}</div>
                        <div style="font-size:0.8rem; color:#888;">${v.publishedAt.split('T')[0]} | ${v.duration || ''}</div>
                    </div>
                </div>
            `).join('');
            updateCopyBtn();
        }

        function renderChannelList() {
            const wrapper = document.getElementById('channelListWrapper');
            wrapper.innerHTML = myChannels.map((c, i) => `
                <div class="channel-item ${activeChannelId === c.channelId ? 'active' : ''}" onclick="loadVideos('${c.channelId}', '${c.title.replace(/'/g, "\\'")}')">
                    <img src="${c.thumbnail}" class="channel-icon">
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</span>
                    <i class="fas fa-times" style="color:#555" onclick="removeChannel(event, ${i})"></i>
                </div>
            `).join('');
        }

        // 나머지 유틸리티 함수 (복사, 플레이어 등)
        function updateCopyBtn() { document.getElementById('copyBtn').textContent = `Copy ${copyIndex + 1} / ${currentVideoList.length}`; }
        function copyNextLink() {
            if (copyIndex >= currentVideoList.length) return alert('끝!');
            navigator.clipboard.writeText(`https://www.youtube.com/watch?v=${currentVideoList[copyIndex].id}`).then(() => {
                copyIndex++; updateCopyBtn();
            });
        }
        function openPlayer(id) {
            document.getElementById('playerModal').classList.add('active');
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        }
        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('youtubePlayer').src = '';
        }
        function removeChannel(e, i) {
            e.stopPropagation();
            if(confirm('삭제하시겠습니까?')) { myChannels.splice(i, 1); saveToStorage(); renderChannelList(); }
        }
        function refreshCurrentChannel() { if(activeChannelId) loadVideos(activeChannelId, "", true); }

        document.getElementById('addChannelBtn').onclick = async () => {
            const input = document.getElementById('channelInput');
            if(!input.value.trim()) return;
            try {
                const res = await fetch(`${API_SERVER_URL}/api/find-channel?handle=${encodeURIComponent(input.value.trim())}`);
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                if(myChannels.some(c => c.channelId === data.channelId)) return alert('이미 있음');
                myChannels.push({...data, videos: []});
                saveToStorage();
                renderChannelList();
                input.value = '';
            } catch(e) { alert(e.message); }
        };
    </script>
</body>
</html>
